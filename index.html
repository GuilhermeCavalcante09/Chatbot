<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Matemática</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Jogo de Matemática</h1>

        <div class="score">
            Pontos: <span id="score">0</span>
        </div>

        <div class="config">

            <div class="option">
                <label for="operation">Operação:</label>
                <select id="operation">
                    <option value="add">Adição</option>
                    <option value="sub">Subtração</option>
                    <option value="mul">Multiplicação</option>
                    <option value="div">Divisão</option>
                </select>
            </div>

            <div class="option">
                <label for="difficulty">Dificuldade:</label>
                <select id="difficulty">
                    <option value="easy">Fácil</option>
                    <option value="medium">Médio</option>
                    <option value="hard">Difícil</option>
                </select>
            </div>

        </div>

        <div class="stats">
            Acertos: <span id="hits">0</span> | Erros: <span id="errors">0</span>
        </div>

        <div class="question-box">
            <p id="question">Carregando...</p>
        </div>

        <div class="input-area">
            <input type="number" id="answer" placeholder="Digite sua resposta">
            <button onclick="checkAnswer()">Responder</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
